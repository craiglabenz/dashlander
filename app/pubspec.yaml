name: dashlander
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  chaos: ^0.1.2+4
  cloud_firestore: ^6.3.0
  data_layer: ^0.0.6+1
  data_layer_firestore: ^0.0.1
  data_layer_hive: ^0.0.2
  firebase_core: ^4.7.0
  flame: ^1.37.0
  flame_audio: ^2.12.1
  flame_behaviors: ^1.3.5
  flutter:
    sdk: flutter
  freezed_annotation: ^3.1.0
