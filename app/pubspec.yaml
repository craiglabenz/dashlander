  provider: ^6.1.5+1
  shared:
    path: ../shared
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  vector_math: ^2.2.0

dev_dependencies:
  build_runner: ^2.15.0
  hive_ce_generator: ^1.11.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5

flutter:
